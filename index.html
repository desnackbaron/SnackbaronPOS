<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6a2600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">
<link rel="stylesheet" href="styles.css">
<title>Snackbaron POS</title>
</head>
<body>
<header>
  <img src="logo.png" alt="De Snackbaron" class="logo">
  <div id="connectionStatus" class="connection-status online">● Online</div><div class="customer-counter">👤 Klant <strong id="customerNo">1</strong></div><div class="top-actions">
    <button id="holdBtn" class="soft">⏸ In wacht</button>
    <button id="heldBtn" class="soft">Wachtend <span id="heldCount">0</span></button>
    <button id="cockpitBtn" class="soft">Cockpit</button>
    <button id="ordersBtn" class="soft">Bestellingen</button>
    <button id="trafficBtn" class="soft">Druktemeter</button>
    <button id="summaryBtn" class="soft">Dagoverzicht</button>
  </div>
</header>

<main>
  <section class="products-panel">
    <nav id="tabs" class="tabs"></nav>
    <div id="productGrid" class="product-grid"></div>
  </section>

  <aside class="cart-panel">
    <div class="cart-header">
      <div>
        <h2 id="cartTitle">Nieuwe bestelling <span id="nextOrderBadge"></span></h2>
        <small id="editHint"></small>
      </div>
      <button id="clearBtn" class="danger small">Wissen</button>
    </div>

    <div id="cartItems" class="cart-items"></div>

    <div class="order-finance">
      <div><span>Foodcost</span><strong id="cartFoodcost">€ 0,00</strong></div>
      <div><span>Brutowinst</span><strong id="cartGrossProfit">€ 0,00</strong></div>
    </div>
    <div class="cart-total">
      <span>Totaal</span>
      <strong id="cartTotal">€ 0,00</strong>
    </div>

    <div class="payment-grid">
      <button class="pay cash" data-pay="Cash">Cash</button>
      <button class="pay payconiq" data-pay="Payconiq">Payconiq</button>
          </div>
  </aside>
</main>

<dialog id="cashDialog">
  <div class="dialog-head">
    <h2>Cashbetaling</h2>
    <button id="cashCloseBtn" class="soft small">Sluiten</button>
  </div>
  <div class="dialog-body">
    <div class="cash-due">Te betalen: <strong id="cashDue"></strong></div>
    <label for="cashReceived">Ontvangen bedrag</label>
    <input id="cashReceived" inputmode="decimal" readonly placeholder="0,00">
    <div id="cashQuick" class="quick-grid"></div>
    <div class="cash-keypad" id="cashKeypad">
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
      <button data-key="clear">C</button><button data-key="0">0</button><button data-key="back">⌫</button>
    </div>
    <div class="change-box">Wisselgeld: <strong id="changeDue">€ 0,00</strong></div>
  </div>
  <div class="dialog-actions">
    <button id="cashConfirmBtn" class="pay cash">Betaling opslaan</button>
  </div>
</dialog>

<dialog id="ordersDialog">
  <div class="dialog-head">
    <h2>Bestellingen van vandaag</h2>
    <button id="ordersCloseBtn" class="soft small">Sluiten</button>
  </div>
  <div id="ordersList" class="dialog-body"></div>
</dialog>


<dialog id="heldDialog">
  <div class="dialog-head">
    <h2>Wachtende bestellingen</h2>
    <button id="heldCloseBtn" class="soft small">Sluiten</button>
  </div>
  <div id="heldList" class="dialog-body"></div>
</dialog>



<dialog id="cockpitDialog">
  <div class="dialog-head">
    <h2>Cockpit</h2>
    <button id="cockpitCloseBtn" class="soft small">Sluiten</button>
  </div>
  <div id="cockpitBody" class="dialog-body"></div>
</dialog>

<dialog id="trafficDialog">
  <div class="dialog-head">
    <h2>Druktemeter per uur</h2>
    <button id="trafficCloseBtn" class="soft small">Sluiten</button>
  </div>
  <div id="trafficBody" class="dialog-body"></div>
</dialog>

<dialog id="closeDayDialog"><div class="dialog-head"><h2>Dag afsluiten</h2><button id="closeDayDialogBtn" class="soft small">Sluiten</button></div><div class="dialog-body"><div id="closeDaySummary" class="close-day-summary"></div><div class="close-day-form"><label>Standplaats<input id="closeStandplaats"></label><label>Weer<select id="closeWeer"><option value="">Kies</option><option>Zonnig</option><option>Bewolkt</option><option>Regen</option><option>Warm</option><option>Koud</option><option>Winderig</option></select></label><label>Personeel<select id="closePersoneel"><option>Alleen</option><option>Met 1 helper</option><option>Met 2 helpers</option></select></label><label>Gas/Diesel (€)<input id="closeGas" type="number" step="0.01" value="0"></label><label>Standgeld (€)<input id="closeStandgeld" type="number" step="0.01" value="0"></label><label>Overige kosten (€)<input id="closeOther" type="number" step="0.01" value="0"></label><label class="full">Opmerking<textarea id="closeNote" rows="3"></textarea></label></div><div id="syncStatus" class="sync-status" hidden></div></div><div class="dialog-actions"><button id="sendToProBtn" class="pay cash">Verstuur nu</button></div></dialog><dialog id="summaryDialog">
  <div class="dialog-head">
    <h2>Dagoverzicht</h2>
    <button id="summaryCloseBtn" class="soft small">Sluiten</button>
  </div>
  <div id="summaryBody" class="dialog-body"></div>
  <div class="dialog-actions">
    <button id="csvBtn" class="soft">Detail CSV</button>
    <button id="closeDayBtn" class="soft">📤 Verstuur naar Snackbaron PRO</button>
    <button id="resetBtn" class="danger">Nieuwe dag starten</button>
  </div>
</dialog>

<div id="toast" class="toast"></div>
<script src="app.js"></script>
</body>
</html>
